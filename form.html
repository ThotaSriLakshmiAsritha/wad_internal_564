<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="styles.css">
        
</head>

<body>

<form onsubmit="return validateForm()">
    <h2>Register</h2>

    Name: <span id="nameError" class="error"></span><br>
    <input type="text" id="name"><br>
   

    Email:   <span id="emailError" class="error"></span><br>
    <input type="text" id="email"><br>
 
    Password:  <span id="passError" class="error"></span><br>
    <input type="password" id="password"><br>
  
    Confirm Password:  <span id="confirmError" class="error"></span><br>
    <input type="password" id="confirm"><br>
  

    <button type="submit">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
